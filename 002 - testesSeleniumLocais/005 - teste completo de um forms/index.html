<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Cadastro de Usuário</h2>
        <form id="meuFormulario">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha (mín. 8 caracteres):</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <div class="form-group">
                <label>Gênero:</label>
                <div class="radio-group">
                    <input type="radio" id="masculino" name="genero" value="masculino"> <label for="masculino">Masculino</label>
                    <input type="radio" id="feminino" name="genero" value="feminino"> <label for="feminino">Feminino</label>
                </div>
            </div>

            <div class="form-group">
                <label for="cidade">Cidade:</label>
                <select id="cidade" name="cidade">
                    <option value="">--Selecione--</option>
                    <option value="sao-paulo">São Paulo</option>
                    <option value="rio-de-janeiro">Rio de Janeiro</option>
                    <option value="belo-horizonte">Belo Horizonte</option>
                </select>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="termos" name="termos">
                <label for="termos">Li e aceito os termos de uso.</label>
            </div>

            <button type="submit">Enviar Cadastro</button>
        </form>
        <div id="mensagem"></div>
    </div>

    <script>
        document.getElementById('meuFormulario').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o envio padrão do formulário

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const genero = document.querySelector('input[name="genero"]:checked');
            const cidade = document.getElementById('cidade').value;
            const termos = document.getElementById('termos').checked;
            const mensagemDiv = document.getElementById('mensagem');

            // Lógica de Validação
            if (nome === '') {
                mostrarMensagem('Erro: O campo Nome é obrigatório.', 'erro');
                return;
            }
            if (senha.length < 8) {
                mostrarMensagem('Erro: A senha deve ter pelo menos 8 caracteres.', 'erro');
                return;
            }
            if (!termos) {
                mostrarMensagem('Erro: Você deve aceitar os termos de uso.', 'erro');
                return;
            }
            if (!genero) {
                mostrarMensagem('Erro: Por favor, selecione um gênero.', 'erro');
                return;
            }
            if (cidade === '') {
                mostrarMensagem('Erro: Por favor, selecione uma cidade.', 'erro');
                return;
            }

            // Se passar por todas as validações
            mostrarMensagem(`Sucesso! Cadastro de ${nome} realizado com e-mail ${email}.`, 'sucesso');
        });

        function mostrarMensagem(texto, tipo) {
            const mensagemDiv = document.getElementById('mensagem');
            mensagemDiv.innerText = texto;
            mensagemDiv.className = tipo; // Aplica a classe 'sucesso' ou 'erro'
        }
    </script>
</body>
</html>
